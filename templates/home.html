<!DOCTYPE html>
<html>
<head>
<title>Blood Donor Finder</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Blood Donor Finder</h1>

<p>Save Lives by Donating Blood ❤️</p>

<a href="/register">
<button>Register as Donor</button>
</a>

<a href="/search">
<button>Find Blood Donor</button>
</a>
<a href="/emergency">
<button class="btn" style="background:red;color:white;">
🚨 Emergency Blood Request
</button>
</a>
<div style="text-align:center;margin-top:40px;">

<h2 style="color:white;">Blood Availability</h2>

<div style="display:flex;justify-content:center;gap:20px;flex-wrap:wrap;">

<div class="card">
<h3>O+</h3>
<p>Status: Available</p>
</div>

<div class="card">
<h3>A+</h3>
<p>Status: Low</p>
</div>

<div class="card">
<h3>B+</h3>
<p>Status: Available</p>
</div>

<div class="card">
<h3>O-</h3>
<p style="color:red;">Emergency Needed</p>
</div>

</div>

</div>
</div>

</body>
</html>

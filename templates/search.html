<!DOCTYPE html>
<html>
<head>
<title>Find Donor</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h2>Find Blood Donor</h2>

<form method="POST">

<select name="blood">
<option value="">Select Blood Group</option>
<option>O+</option>
<option>O-</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input type="text" name="city" placeholder="City" required>

<button type="submit">Search Donor</button>

</form>

</div>

</body>
</html>
